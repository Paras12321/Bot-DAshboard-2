<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discord Bot Dashboard</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body class="dashboard-page">

    <div class="toast-container" id="toastContainer"></div>

    <div class="main-content full-width">

        <header class="topbar simple-topbar">

            <h1>Discord Bot Dashboard</h1>

            <div class="topbar-right">
                <span class="online-dot"></span>
                <span class="online-text">System Online</span>
            </div>

        </header>

        <div class="content-area">

            <!-- STATS -->

            <div class="stats-row">

                <div class="stat-card">

                    <div class="stat-card-icon blue">🤖</div>

                    <div class="stat-card-info">

                        <div class="stat-value" id="statBots">0</div>

                        <div class="stat-label">Discord Bots</div>

                        <div class="stat-sub" id="statBotsSub">
                            0 Active Bots
                        </div>

                    </div>

                </div>

                <div class="stat-card">

                    <div class="stat-card-icon green">✉️</div>

                    <div class="stat-card-info">

                        <div class="stat-value" id="statMessages">0</div>

                        <div class="stat-label">Messages Sent</div>

                        <div class="stat-sub stat-sub-green" id="statMsgSub">
                            Active Messaging
                        </div>

                    </div>

                </div>

                <div class="stat-card">

                    <div class="stat-card-icon purple">⚡</div>

                    <div class="stat-card-info">

                        <div class="stat-value" id="statAutoReply">0</div>

                        <div class="stat-label">Auto Reply Rules</div>

                        <div class="stat-sub">
                            Active Rules
                        </div>

                    </div>

                </div>

            </div>

            <!-- ADD BOT + SEND MESSAGE -->

            <div class="panel-row">

                <!-- ADD BOT -->

                <div class="panel">

                    <div class="panel-header">
                        <div class="panel-icon blue-bg">🤖</div>
                        <h3>Add Discord Bot</h3>
                    </div>

                    <div class="panel-body">

                        <form id="addBotForm">

                            <div class="form-group">

                                <label>Bot Name</label>

                                <input type="text"
                                    id="botName"
                                    class="form-control"
                                    placeholder="Enter bot name"
                                    required>

                            </div>

                            <div class="form-group">

                                <label>Bot Token</label>

                                <div class="input-icon-wrap">

                                    <input type="password"
                                        id="botToken"
                                        class="form-control"
                                        placeholder="Enter Discord bot token"
                                        required>

                                    <button type="button"
                                        class="input-icon-btn"
                                        onclick="toggleTokenVis()">

                                        👁️
                                    </button>

                                </div>

                            </div>

                            <button type="submit"
                                class="btn btn-primary">

                                Add Bot
                            </button>

                        </form>

                    </div>

                </div>

                <!-- SEND MESSAGE -->

                <div class="panel">

                    <div class="panel-header">
                        <div class="panel-icon teal-bg">✈️</div>
                        <h3>Send Message</h3>
                    </div>

                    <div class="panel-body">

                        <form id="sendMessageForm">

                            <div class="form-group">

                                <label>Select Bot</label>

                                <select id="msgBot"
                                    class="form-control"
                                    required>

                                    <option value="">
                                        Select Discord Bot
                                    </option>

                                </select>

                            </div>

                            <div class="form-group">

                                <label>Discord Channel ID</label>

                                <input type="text"
                                    id="msgTarget"
                                    class="form-control"
                                    placeholder="Enter Discord Channel ID"
                                    required>

                            </div>

                            <div class="form-group">

                                <label>Message</label>

                                <textarea id="msgContent"
                                    class="form-control"
                                    placeholder="Type your message..."
                                    required></textarea>

                            </div>

                            <button type="submit"
                                class="btn btn-send">

                                Send Message
                            </button>

                        </form>

                    </div>

                </div>

            </div>

            <!-- AUTO REPLY + WELCOME -->

            <div class="panel-row">

                <!-- AUTO REPLY -->

                <div class="panel">

                    <div class="panel-header">
                        <div class="panel-icon red-bg">⚡</div>
                        <h3>Auto Reply</h3>
                    </div>

                    <div class="panel-body">

                        <form id="autoReplyForm">

                            <div class="form-group">

                                <label>Select Bot</label>

                                <select id="arBot"
                                    class="form-control"
                                    required>

                                    <option value="">
                                        Select Discord Bot
                                    </option>

                                </select>

                            </div>

                            <div class="form-group">

                                <label>Keyword</label>

                                <input type="text"
                                    id="arKeyword"
                                    class="form-control"
                                    placeholder="Enter keyword"
                                    required>

                            </div>

                            <div class="form-group">

                                <label>Response</label>

                                <input type="text"
                                    id="arResponse"
                                    class="form-control"
                                    placeholder="Enter auto reply..."
                                    required>

                            </div>

                            <button type="submit"
                                class="btn btn-addrule">

                                Add Rule
                            </button>

                        </form>

                        <div id="autoReplyList"
                            style="margin-top:1rem; max-height:120px; overflow-y:auto;">
                        </div>

                    </div>

                </div>

                <!-- WELCOME -->

                <div class="panel">

                    <div class="panel-header">
                        <div class="panel-icon green-bg">👋</div>
                        <h3>Welcome Message</h3>
                    </div>

                    <div class="panel-body">

                        <form id="welcomeForm">

                            <div class="form-group">

                                <label>Select Bot</label>

                                <select id="welBot"
                                    class="form-control"
                                    required>

                                    <option value="">
                                        Select Discord Bot
                                    </option>

                                </select>

                            </div>

                            <div class="form-group">

                                <label>Discord Channel ID</label>

                                <input type="text"
                                    id="welChannel"
                                    class="form-control"
                                    placeholder="Enter Discord Channel ID"
                                    required>

                            </div>

                            <div class="form-group">

                                <label>Welcome Message</label>

                                <textarea id="welMessage"
                                    class="form-control"
                                    placeholder="Welcome message..."
                                    required></textarea>

                            </div>

                            <button type="submit"
                                class="btn btn-welcome">

                                Save Welcome Message
                            </button>

                        </form>

                    </div>

                </div>

            </div>

            <!-- LOGS -->

            <div class="panel-row">

                <div class="panel panel-full">

                    <div class="panel-header">
                        <div class="panel-icon yellow-bg">📋</div>
                        <h3>Recent Logs</h3>
                    </div>

                    <div class="panel-body"
                        style="padding:0;">

                        <div class="table-wrapper">

                            <table class="log-table">

                                <thead>

                                    <tr>
                                        <th>Time</th>
                                        <th>Bot</th>
                                        <th>Message</th>
                                        <th>Status</th>
                                    </tr>

                                </thead>

                                <tbody id="logTableBody">

                                    <tr>

                                        <td colspan="4"
                                            class="empty-cell">

                                            No logs yet

                                        </td>

                                    </tr>

                                </tbody>

                            </table>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
